services:
  postgres:
    image: postgres:16-alpine
    container_name: vindicate-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vindicate_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vindicate_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: vindicate-backend-dev
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.example
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vindicate_dev
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SIWE_DOMAIN: localhost
      SIWE_URI: http://localhost:5173
      RPC_URLS: http://host.docker.internal:8545
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "npm install && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: vindicate-frontend-dev
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
